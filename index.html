<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="logo.png">
    <title>小乖乖成长日志</title>
    <style>
        :root { 
            --bg-color: #fcf9f2; 
            --milk-color: #ffeadb; 
            --poo-color: #e2f0d9; 
            --med-color: #e1f5fe; 
            --text-color: #555; 
        }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; color: var(--text-color); }
        
        /* 头像与头部 */
        .avatar-container { position: relative; width: 100px; height: 100px; margin: 30px auto 10px; cursor: pointer; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.08); background-color: #eee; }
        .camera-icon { position: absolute; bottom: 5px; right: 5px; background: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: #888; }
        header { text-align: center; margin-bottom: 15px; }
        header h1 { font-size: 1.5rem; margin: 5px 0; color: #444; }
        header p { font-size: 0.8rem; opacity: 0.6; margin: 0; text-decoration: underline; cursor: pointer; }

        /* 记录按钮 */
        .btn-container { width: 85%; max-width: 350px; display: grid; gap: 12px; }
        .log-card { border: none; border-radius: 20px; padding: 18px; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .log-card:active { transform: scale(0.96); opacity: 0.8; }
        .log-card span { font-size: 1.8rem; }
        .log-card label { font-size: 1rem; font-weight: 600; color: #444; cursor: pointer; }
        .milk { background-color: var(--milk-color); }
        .poo { background-color: var(--poo-color); }
        .med { background-color: var(--med-color); }

        #status-msg { margin: 10px 0; font-size: 0.8rem; color: #888; min-height: 1.2rem; text-align: center; }

        /* 历史列表 */
        .history-section { width: 85%; max-width: 350px; margin-top: 10px; }
        .history-title { font-size: 0.85rem; color: #aaa; margin-bottom: 10px; border-bottom: 1px dashed #ddd; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        #log-list { list-style: none; padding: 0; margin: 0; }
        .log-item { margin-bottom: 12px; padding: 15px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.03); }
        .log-info b { display: block; font-size: 0.95rem; margin-bottom: 2px; color: #444; }
        .log-info span { font-size: 0.75rem; color: #666; opacity: 0.8; }
        .log-actions { display: flex; gap: 15px; align-items: center; }

        /* 🍼 喂奶细节弹窗样式 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-content { background: white; padding: 25px; border-radius: 30px; width: 80%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .modal-content h3 { margin-top: 0; color: #444; font-size: 1.2rem; }
        .side-selector { display: flex; justify-content: space-around; margin: 20px 0; gap: 8px; }
        .side-btn { flex: 1; padding: 12px 5px; border: 2px solid #f0f0f0; border-radius: 15px; background: #fafafa; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .side-btn.active { background: var(--milk-color); border-color: #ffccbc; font-weight: bold; }
        .duration-input { margin: 20px 0; font-size: 0.95rem; }
        .duration-input input { width: 60px; padding: 8px; border-radius: 10px; border: 1px solid #ddd; text-align: center; font-size: 1rem; outline: none; }
        .modal-btns { display: flex; gap: 12px; margin-top: 10px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 15px; border: none; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-cancel { background: #eee; color: #777; }
        .btn-confirm { background: var(--milk-color); color: #444; font-weight: bold; }
    </style>
</head>
<body>

    <div class="avatar-container" onclick="document.getElementById('fileInput').click()">
        <img id="baby-avatar" class="avatar-img" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjU0IiByPSI0MCIgZmlsbD0iI0ZGRkZGRiIvPjxjaXJjbGUgY3g9IjI4IiBjeT0iMzAiIHI9IjgiIGZpbGw9IiNDRUNFQ0UiLz48Y2lyY2xlIGN4PSI3MiIgY3k9IjMwIiByPSI4IiBmaWxsPSIjQ0VDRUNFIi8+PHBhdGggZD0iTTUwLDE0QzMwLDE0LDE0LDMwLDE0LDUwczE2LDM2LDM2LDM2czM2LTE2LDM2LTM2UzcwLDE0LDUwLDE0eiBNNzguMyw2MC42Qzc1LjIsNzUuNyw2NC45LDg3LjUsNTAsODcuNVMyNC44LDc1LjcsMjEuNyw2MC42QzIwLjgsNTYuMywyNCw1Mi41LDI4LjQsNTIuNWg0My4yQzc2LDUyLjUsNzkuMiw1Ni4zLDc4LjMsNjAuNnoiIGZpbGw9IiM4QTVDRTAiLz48Y2lyY2xlIGN4PSIzNyIgY3k9IjM1IiByPSI0IiBmaWxsPSIjRkZGRkZGIi8+PHBhdGggZD0iTTMwLDMyYzAtNS41LDQuNS0xMCwxMC0xMHMxMCw0LjUsMTAsMTBzLTQuNSwxMC0xMCwxMFMzMCwzNy41LDMwLDMyeiIgZmlsbD0iIzQwMzIzMCIvPjxjaXJjbGUgY3g9IjQwIiBjeT0iNDgiIHI9IjEuNSIgZmlsbD0iI0ZGRkZGRiIvPjxjaXJjbGUgY3g9IjM3IiBjeT0iNTUiIHI9IjcuNSIgZmlsbD0iI0ZGOTk5OSIgb3BhY2l0eT0iMC4zIi8+PGNpcmNsZSBjeD0iMjgiIGN5PSIxMSIgcj0iNS41IiBmaWxsPSIjRkY5OTk5Ii8+PC9zdmc+" alt="宝宝头像">
        <div class="camera-icon">📷</div>
    </div>
    <input type="file" id="fileInput" hidden accept="image/*" onchange="handleAvatarUpload(event)">

    <header>
        <h1>宝宝成长记录</h1>
        <p id="family-display" onclick="setupFamilyId()">点击设置家庭暗号</p>
    </header>

    <div class="btn-container">
        <button class="log-card milk" onclick="handleAction('吃奶')"><span>🍼</span><label>吃奶</label></button>
        <button class="log-card poo" onclick="handleAction('排便')"><span>💩</span><label>排便</label></button>
        <button class="log-card med" onclick="handleAction('吃甜甜')"><span>🍬</span><label>吃甜甜</label></button>
    </div>

    <div id="status-msg"></div>

    <div id="milk-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>🍼 喂奶细节</h3>
            <div class="side-selector">
                <button class="side-btn" onclick="selectSide('左侧')">左侧</button>
                <button class="side-btn active" onclick="selectSide('双侧')">双侧</button>
                <button class="side-btn" onclick="selectSide('右侧')">右侧</button>
            </div>
            <div class="duration-input">
                <label>单次时长：</label>
                <input type="number" id="milk-duration" value="15" min="1">
                <span> 分钟</span>
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeMilkModal()">取消</button>
                <button class="btn-confirm" onclick="confirmMilkDetail()">确认记录</button>
            </div>
        </div>
    </div>

    <div class="history-section">
        <div class="history-title">
            <span>🕒 最近动态</span>
            <span onclick="handleClearAll()" style="color: #ff9999; cursor: pointer; font-size: 0.7rem; padding: 4px 8px;">清空全部</span>
        </div>
        <ul id="log-list">
            <li style="text-align:center; color:#ddd; padding:20px;">数据加载中...</li>
        </ul>
    </div>

    <script type="module" src="app.js"></script>

    <script>
        let familyId = localStorage.getItem('baby_family_id');
        let updateTimer = null;
        let isEditing = false;
        let currentMilkSide = '双侧'; // 记录当前选中的侧边

        function setupFamilyId() {
            const input = prompt("请输入家庭专属暗号（全家统一用这个）：", familyId || "");
            if (input && input.trim() !== "") {
                familyId = input.trim();
                localStorage.setItem('baby_family_id', familyId);
                location.reload();
            }
        }

        async function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file || !familyId) return;
            const imgEl = document.getElementById('baby-avatar');
            const reader = new FileReader();
            reader.onload = (e) => imgEl.src = e.target.result;
            reader.readAsDataURL(file);

            if (window.uploadAvatar) {
                document.getElementById('status-msg').innerText = "正在同步照片...";
                await window.uploadAvatar(file, familyId);
                document.getElementById('status-msg').innerText = "✅ 头像已更新";
                setTimeout(() => document.getElementById('status-msg').innerText = "", 2000);
            }
        }

        // --- 🍼 喂奶细节逻辑 ---
        function selectSide(side) {
            currentMilkSide = side;
            document.querySelectorAll('.side-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === side);
            });
        }

        function closeMilkModal() {
            document.getElementById('milk-modal').style.display = 'none';
        }

        async function confirmMilkDetail() {
            const duration = document.getElementById('milk-duration').value || 0;
            const finalType = `吃奶 (${currentMilkSide}${duration}min)`;
            closeMilkModal();
            saveRecordToDb(finalType);
        }

        // --- 核心操作函数 ---
        async function handleAction(type) {
            if (!familyId) return setupFamilyId();
            
            // 如果是吃奶，拦截并弹出弹窗
            if (type === '吃奶') {
                document.getElementById('milk-modal').style.display = 'flex';
                return;
            }
            
            saveRecordToDb(type);
        }

        async function saveRecordToDb(typeString) {
            if (!window.saveRecord) return;
            document.getElementById('status-msg').innerText = `正在同步 ${typeString}...`;
            const success = await window.saveRecord(typeString, familyId);
            if (success) {
                document.getElementById('status-msg').innerText = `✨ 已记录 ${typeString}`;
                setTimeout(() => document.getElementById('status-msg').innerText = "", 2000);
            }
        }

        async function handleClearAll() {
            if (!familyId) return setupFamilyId();
            const input = prompt("请输入家庭暗号以确认清空：");
            if (input === familyId) {
                if (confirm("⚠️ 确定要删除该暗号下的所有记录吗？此操作无法撤销！")) {
                    document.getElementById('status-msg').innerText = "正在清空记录...";
                    const success = await window.clearAllRecords(familyId);
                    if (success) {
                        document.getElementById('status-msg').innerText = "🗑️ 记录已清空";
                        setTimeout(() => document.getElementById('status-msg').innerText = "", 2000);
                    }
                }
            } else if (input !== null) {
                alert("暗号不正确");
            }
        }

        function debouncedUpdate(id, newValue) {
            isEditing = true;
            clearTimeout(updateTimer);
            updateTimer = setTimeout(async () => {
                if(newValue && window.updateRecord) {
                    document.getElementById('status-msg').innerText = "正在修正时间...";
                    await window.updateRecord(id, newValue);
                    document.getElementById('status-msg').innerText = "⏰ 时间已修正";
                    setTimeout(() => {
                        document.getElementById('status-msg').innerText = "";
                        isEditing = false;
                    }, 800);
                } else {
                    isEditing = false;
                }
            }, 800); 
        }

        window.onload = () => {
            if (!familyId) {
                setupFamilyId();
            } else {
                document.getElementById('family-display').innerText = "当前家庭：" + familyId + " (点击修改)";
                const cached = localStorage.getItem(`avatar_${familyId}`);
                if(cached) document.getElementById('baby-avatar').src = cached;

                const listEl = document.getElementById('log-list');
                const checkStatus = setInterval(() => {
                    if (window.listenToLogs) {
                        clearInterval(checkStatus);
                        window.listenToLogs(familyId, (logs) => {
                            if (isEditing) return; 
                            if (logs.length === 0) {
                                listEl.innerHTML = '<li style="text-align:center;color:#ddd;padding:20px;">此暗号下暂无记录</li>';
                                return;
                            }
                            listEl.innerHTML = logs.map(log => {
                                let bgColor = '#ffffff'; 
                                if (log.type.startsWith('吃奶')) bgColor = 'var(--milk-color)';
                                if (log.type === '排便') bgColor = 'var(--poo-color)';
                                if (log.type === '吃甜甜') bgColor = 'var(--med-color)';

                                return `
                                    <li class="log-item" style="background-color: ${bgColor};">
                                        <div class="log-info">
                                            <b>${log.type}</b>
                                            <span>${log.timeStr}</span>
                                        </div>
                                        <div class="log-actions">
                                            <div style="position: relative; width: 32px; height: 32px; flex-shrink: 0;">
                                                <button class="btn-edit" style="width:100%; height:100%; padding:0; margin:0; display:flex; align-items:center; justify-content:center; border:none; border-radius: 8px; background: rgba(255,255,255,0.5);">⏰</button>
                                                <input type="datetime-local" 
                                                       value="${log.fullTime}"
                                                       style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; -webkit-appearance: none;"
                                                       oninput="window.debouncedUpdate('${log.id}', this.value)"
                                                       onblur="window.isEditing = false">
                                            </div>
                                            <button class="btn-del" 
                                                    onclick="window.deleteRecord('${log.id}')" 
                                                    style="width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; border: none; background: rgba(255,255,255,0.5); border-radius: 8px; flex-shrink: 0; z-index: 10; color: #ff9999;">
                                                🗑️
                                            </button>
                                        </div>
                                    </li>
                                `;
                            }).join('');
                        });
                    }
                }, 300);
            }
        };

        window.handleAction = handleAction;
        window.handleClearAll = handleClearAll;
        window.setupFamilyId = setupFamilyId;
        window.handleAvatarUpload = handleAvatarUpload;
        window.debouncedUpdate = debouncedUpdate;
        window.selectSide = selectSide;
        window.closeMilkModal = closeMilkModal;
        window.confirmMilkDetail = confirmMilkDetail;
    </script>
</body>
</html>
