<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="logo.png">
    <title>小乖乖成长日志</title>
    <style>
        :root { --bg-color: #fcf9f2; --milk-color: #ffeadb; --poo-color: #e2f0d9; --med-color: #e1f5fe; --text-color: #555; }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; color: var(--text-color); }
        
        .avatar-container { position: relative; width: 90px; height: 90px; margin: 30px auto 10px; cursor: pointer; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.08); background-color: #eee; }
        .camera-icon { position: absolute; bottom: 2px; right: 2px; background: #fff; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        header { text-align: center; margin-bottom: 15px; }
        header h1 { font-size: 1.5rem; margin: 5px 0; color: #444; }
        header p { font-size: 0.8rem; opacity: 0.6; margin: 0; text-decoration: underline; cursor: pointer; }

        .btn-container { width: 85%; max-width: 350px; display: grid; gap: 12px; }
        .log-card { border: none; border-radius: 20px; padding: 18px; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .log-card:active { transform: scale(0.96); opacity: 0.8; }
        .log-card span { font-size: 1.8rem; }
        .log-card label { font-size: 1rem; font-weight: 600; color: #444; cursor: pointer; }
        .milk { background-color: var(--milk-color); }
        .poo { background-color: var(--poo-color); }
        .med { background-color: var(--med-color); }

        #status-msg { margin: 10px 0; font-size: 0.8rem; color: #888; min-height: 1.2rem; text-align: center; }

        .history-section { width: 85%; max-width: 350px; margin-top: 10px; }
        .history-title { font-size: 0.85rem; color: #aaa; margin-bottom: 10px; border-bottom: 1px dashed #ddd; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        #log-list { list-style: none; padding: 0; margin: 0; }
        .log-item { background: white; margin-bottom: 10px; padding: 15px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .log-info b { display: block; font-size: 0.95rem; margin-bottom: 2px; }
        .log-info span { font-size: 0.7rem; color: #bbb; letter-spacing: -0.2px; } /* 日期字体微调 */
        .log-actions { display: flex; gap: 12px; align-items: center; }
        .btn-edit, .btn-del { border: none; padding: 6px 10px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; }
        .btn-edit { background: #f5f5f5; color: #666; }
        .btn-del { background: #fff0f0; color: #ff9999; }
    </style>
</head>
<body>

    <div class="avatar-container" onclick="document.getElementById('fileInput').click()">
        <img id="baby-avatar" class="avatar-img" src="https://api.dicebear.com/7.x/adventurer/svg?seed=Baby" alt="宝宝头像">
        <div class="camera-icon">📷</div>
    </div>
    <input type="file" id="fileInput" hidden accept="image/*" onchange="handleAvatarUpload(event)">

    <header>
        <h1>宝宝成长记录</h1>
        <p id="family-display" onclick="setupFamilyId()">点击设置家庭暗号</p>
    </header>

    <div class="btn-container">
        <button class="log-card milk" onclick="handleAction('吃奶')"><span>🍼</span><label>吃奶</label></button>
        <button class="log-card poo" onclick="handleAction('排便')"><span>💩</span><label>排便</label></button>
        <button class="log-card med" onclick="handleAction('吃甜甜')"><span>🍬</span><label>吃甜甜</label></button>
    </div>

    <div id="status-msg"></div>

    <div class="history-section">
        <div class="history-title">
            <span>🕒 最近动态</span>
            <span onclick="handleClearAll()" style="color: #ff9999; cursor: pointer; font-size: 0.7rem; padding: 4px 8px;">清空全部</span>
        </div>
        <ul id="log-list">
            <li style="text-align:center; color:#ddd; padding:20px;">请设置暗号以加载数据...</li>
        </ul>
    </div>

    <script type="module" src="app.js"></script>

    <script>
        let familyId = localStorage.getItem('baby_family_id');

        function setupFamilyId() {
            const input = prompt("请输入家庭专属暗号（全家统一用这个）：", familyId || "");
            if (input && input.trim() !== "") {
                familyId = input.trim();
                localStorage.setItem('baby_family_id', familyId);
                location.reload();
            }
        }

        async function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file || !familyId) return;
            const imgEl = document.getElementById('baby-avatar');
            const reader = new FileReader();
            reader.onload = (e) => imgEl.src = e.target.result;
            reader.readAsDataURL(file);
            if (window.uploadAvatar) {
                document.getElementById('status-msg').innerText = "正在同步照片...";
                await window.uploadAvatar(file, familyId);
                document.getElementById('status-msg').innerText = "✅ 头像已更新";
                setTimeout(() => document.getElementById('status-msg').innerText = "", 2000);
            }
        }

        async function handleAction(type) {
            if (!familyId) return setupFamilyId();
            if (!window.saveRecord) return;
            document.getElementById('status-msg').innerText = `正在同步 ${type}...`;
            const success = await window.saveRecord(type, familyId);
            if (success) {
                document.getElementById('status-msg').innerText = `✨ 已记录 ${type}`;
                setTimeout(() => document.getElementById('status-msg').innerText = "", 2000);
            }
        }

        async function handleClearAll() {
            if (!familyId) return setupFamilyId();
            const input = prompt("请输入家庭暗号以确认清空：");
            if (input === familyId) {
                if (confirm("⚠️ 确定要删除该暗号下的所有记录吗？此操作无法撤销！")) {
                    document.getElementById('status-msg').innerText = "正在清空记录...";
                    const success = await window.clearAllRecords(familyId);
                    if (success) {
                        document.getElementById('status-msg').innerText = "🗑️ 记录已清空";
                        setTimeout(() => document.getElementById('status-msg').innerText = "", 2000);
                    }
                }
            } else if (input !== null) {
                alert("暗号不正确");
            }
        }

        window.onload = () => {
            if (!familyId) {
                setupFamilyId();
            } else {
                document.getElementById('family-display').innerText = "当前家庭：" + familyId + " (点击修改)";
                const cached = localStorage.getItem(`avatar_${familyId}`);
                if(cached) document.getElementById('baby-avatar').src = cached;

                const listEl = document.getElementById('log-list');
                const checkStatus = setInterval(() => {
                    if (window.listenToLogs) {
                        clearInterval(checkStatus);
                        window.listenToLogs(familyId, (logs) => {
                            if (logs.length === 0) {
                                listEl.innerHTML = '<li style="text-align:center;color:#ddd;padding:20px;">此暗号下暂无记录</li>';
                                return;
                            }
                            listEl.innerHTML = logs.map(log => `
                                <li class="log-item">
                                    <div class="log-info">
                                        <b>${log.type}</b>
                                        <span>${log.timeStr}</span>
                                    </div>
                                    <div class="log-actions">
                                        <div style="position: relative; width: 32px; height: 32px;">
                                            <button class="btn-edit" style="width:100%; height:100%; padding:0; margin:0; display:flex; align-items:center; justify-content:center;">⏰</button>
                                            <input type="datetime-local" 
                                                   value="${log.fullTime}"
                                                   style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;"
                                                   onchange="if(this.value) window.updateRecord('${log.id}', this.value)">
                                        </div>
                                        <button class="btn-del" onclick="window.deleteRecord('${log.id}')">🗑️</button>
                                    </div>
                                </li>
                            `).join('');
                        });
                    }
                }, 300);
            }
        };

        window.handleAction = handleAction;
        window.handleClearAll = handleClearAll;
        window.setupFamilyId = setupFamilyId;
        window.handleAvatarUpload = handleAvatarUpload;
    </script>
</body>
</html>
