<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小乖乖成长日志</title>
    <style>
        :root { --bg-color: #fcf9f2; --milk-color: #ffeadb; --poo-color: #e2f0d9; --med-color: #e1f5fe; --d3-color: #fff9db; --text-color: #555; }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; color: var(--text-color); overflow-x: hidden; }
        .avatar-container { position: relative; width: 100px; height: 100px; margin: 30px auto 10px; cursor: pointer; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.08); background-color: #eee; }
        header { text-align: center; margin-bottom: 15px; }
        header h1 { font-size: 1.5rem; margin: 5px 0; color: #444; }
        header p { font-size: 0.8rem; opacity: 0.6; margin: 0; text-decoration: underline; cursor: pointer; }
        #d3-alert { width: 85%; max-width: 350px; margin-bottom: 15px; border-radius: 15px; padding: 12px; display: none; text-align: center; font-size: 0.9rem; font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .btn-container { width: 85%; max-width: 350px; display: grid; gap: 12px; }
        .log-card { border: none; border-radius: 20px; padding: 18px; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.03); -webkit-tap-highlight-color: transparent; }
        .log-card span { font-size: 1.8rem; }
        .log-card label { font-size: 1rem; font-weight: 600; color: #444; cursor: pointer; }
        .milk { background-color: var(--milk-color); }
        .poo { background-color: var(--poo-color); }
        .med { background-color: var(--med-color); }
        .history-section { width: 85%; max-width: 350px; margin-top: 10px; }
        .history-title { font-size: 0.85rem; color: #aaa; margin-bottom: 10px; border-bottom: 1px dashed #ddd; padding-bottom: 5px; display: flex; justify-content: space-between; }
        #log-list { list-style: none; padding: 0; margin: 0; }
        .log-item { margin-bottom: 12px; padding: 15px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .log-info { flex: 1; min-height: 44px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; } 
        .log-info b { font-size: 0.95rem; color: #444; pointer-events: none; }
        .log-info span { font-size: 0.75rem; color: #666; opacity: 0.8; pointer-events: none; }
        .log-actions { display: flex; gap: 12px; align-items: center; }
        .action-btn-wrap { position: relative; width: 36px; height: 36px; }
        .action-btn { border: none; background: rgba(255,255,255,0.5); border-radius: 10px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .time-picker-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; -webkit-appearance: none; z-index: 5; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 25px; border-radius: 30px; width: 80%; max-width: 340px; text-align: center; }
        .mode-tabs { display: flex; background: #f0f0f0; border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .mode-tab { flex: 1; padding: 8px; font-size: 0.85rem; border-radius: 10px; cursor: pointer; }
        .mode-tab.active { background: white; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .time-input-group { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; background: #fafafa; padding: 10px; border-radius: 15px; }
        .time-box input { width: 50px; padding: 8px; border-radius: 8px; border: 1px solid #ddd; text-align: center; font-size: 1.1rem; }
        .modal-btns { display: flex; gap: 12px; margin-top: 15px; }
        .modal-btns button { flex: 1; padding: 14px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="avatar-container" onclick="document.getElementById('fileInput').click()">
    <img id="baby-avatar" class="avatar-img" 
         src="https://api.dicebear.com/7.x/adventurer-neutral/svg?seed=baby" 
         alt="头像">
</div>
    <input type="file" id="fileInput" hidden accept="image/*" onchange="handleAvatarUpload(event)">

    <header>
        <h1>宝宝成长记录</h1>
        <p id="family-display" onclick="setupFamilyId()">设置家庭暗号</p>
    </header>

    <div id="d3-alert"></div>

    <div class="btn-container">
        <button class="log-card milk" onclick="handleAction('吃奶')"><span>🍼</span><label>吃奶</label></button>
        <button class="log-card poo" onclick="handleAction('排便')"><span>💩</span><label>排便</label></button>
        <button class="log-card med" onclick="handleAction('吃甜甜')"><span>🍬</span><label>吃甜甜</label></button>
    </div>

    <div id="milk-modal" class="modal-overlay" onclick="if(event.target==this) closeMilkModal()">
        <div class="modal-content">
            <h3 id="modal-title">🍼 喂奶记录</h3>
            <div class="mode-tabs">
                <div class="mode-tab active" id="tab-leftFirst" onclick="switchMilkMode('leftFirst')">左 ➔ 右</div>
                <div class="mode-tab" id="tab-rightFirst" onclick="switchMilkMode('rightFirst')">右 ➔ 左</div>
                <div class="mode-tab" id="tab-single" onclick="switchMilkMode('single')">单侧</div>
            </div>
            <div class="time-input-group">
                <div class="time-box">
                    <label id="label-1" style="font-size:0.7rem;display:block">左侧(m)</label>
                    <input type="number" id="time-1" value="15">
                </div>
                <div id="mode-arrow">➔</div>
                <div class="time-box" id="box-2">
                    <label id="label-2" style="font-size:0.7rem;display:block">右侧(m)</label>
                    <input type="number" id="time-2" value="10">
                </div>
            </div>
            <div class="modal-btns">
                <button style="background:#eee;color:#777" onclick="closeMilkModal()">取消</button>
                <button style="background:var(--milk-color);color:#444" onclick="confirmMilkDetail()">确认</button>
            </div>
        </div>
    </div>

    <div class="history-section">
        <div class="history-title"><span>🕒 最近动态</span><span onclick="handleClearAll()" style="color:#ff9999;cursor:pointer">清空全部</span></div>
        <ul id="log-list"></ul>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        let familyId = localStorage.getItem('baby_family_id');
        let milkMode = 'leftFirst';
        let currentEditId = null;
        let isEditingTime = false;

        function setupFamilyId() {
            const input = prompt("请输入家庭暗号：", familyId || "");
            if (input) { familyId = input.trim(); localStorage.setItem('baby_family_id', familyId); location.reload(); }
        }

        async function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (file && window.uploadAvatar) await window.uploadAvatar(file, familyId);
        }

        function switchMilkMode(mode) {
            milkMode = mode;
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + mode).classList.add('active');
            const isSingle = mode === 'single';
            document.getElementById('box-2').style.display = isSingle ? 'none' : 'block';
            document.getElementById('mode-arrow').style.display = isSingle ? 'none' : 'block';
            document.getElementById('label-1').innerText = mode === 'rightFirst' ? '右侧(m)' : (isSingle ? '单侧(m)' : '左侧(m)');
            document.getElementById('label-2').innerText = mode === 'rightFirst' ? '左侧(m)' : '右侧(m)';
        }

        window.openMilkModal = function(id, oldType) {
            currentEditId = id;
            document.getElementById('modal-title').innerText = "📝 修改喂奶细节";
            const nums = oldType.match(/\d+/g) || [15, 10];
            document.getElementById('time-1').value = nums[0];
            if (nums[1]) document.getElementById('time-2').value = nums[1];
            if (oldType.includes('➔')) {
                switchMilkMode(oldType.indexOf('左') < oldType.indexOf('右') ? 'leftFirst' : 'rightFirst');
            } else { switchMilkMode('single'); }
            document.getElementById('milk-modal').style.display = 'flex';
        };

        function closeMilkModal() { document.getElementById('milk-modal').style.display = 'none'; }

        async function confirmMilkDetail() {
            const t1 = document.getElementById('time-1').value;
            const t2 = document.getElementById('time-2').value;
            let finalType = milkMode === 'leftFirst' ? `吃奶 (左${t1}m ➔ 右${t2}m)` : 
                           (milkMode === 'rightFirst' ? `吃奶 (右${t1}m ➔ 左${t2}m)` : `吃奶 (单侧${t1}min)`);
            closeMilkModal();
            if (currentEditId) await window.updateTypeOnly(currentEditId, finalType);
            else await window.saveRecord(finalType, familyId);
        }

        window.handleAction = (type) => {
            if (!familyId) return setupFamilyId();
            if (type === '吃奶') {
                currentEditId = null;
                document.getElementById('modal-title').innerText = "🍼 喂奶记录";
                document.getElementById('time-1').value = 15;
                document.getElementById('time-2').value = 10;
                switchMilkMode('leftFirst');
                document.getElementById('milk-modal').style.display = 'flex';
            } else window.saveRecord(type, familyId);
        };

        window.handleTimeUpdate = async (id, newVal) => {
            if(!newVal) { isEditingTime = false; return; }
            await window.updateRecord(id, newVal);
            isEditingTime = false;
        };

        window.onload = () => {
            if (!familyId) return setupFamilyId();
            const listEl = document.getElementById('log-list');
            const d3Alert = document.getElementById('d3-alert');

            if (window.listenToLogs) {
                window.listenToLogs(familyId, (logs) => {
                    if (isEditingTime) return;

                    const todayStr = new Date().toLocaleDateString();
                    const hasD3Today = logs.some(log => 
                        log.type === '💊 维生素 D3' && 
                        new Date(log.fullTime).toLocaleDateString() === todayStr
                    );

                    d3Alert.style.display = 'block';
                    if (hasD3Today) {
                        d3Alert.style.backgroundColor = '#e2f0d9';
                        d3Alert.style.color = '#5b8a4a';
                        d3Alert.innerText = '✅ 今日维生素 D3 已服用';
                    } else {
                        d3Alert.style.backgroundColor = '#fff3cd';
                        d3Alert.style.color = '#856404';
                        d3Alert.innerHTML = `⚠️ 今日尚未服用 D3 <button onclick="window.saveRecord('💊 维生素 D3', '${familyId}')" style="margin-left:10px; border:none; background:#ffcc00; border-radius:8px; padding:4px 10px; cursor:pointer; font-weight:bold; color:#444;">立刻打卡</button>`;
                    }

                    let html = '';
                    logs.forEach(log => {
                        let bgColor = log.type.includes('D3') ? 'var(--d3-color)' : (log.type.startsWith('吃奶') ? 'var(--milk-color)' : (log.type === '排便' ? 'var(--poo-color)' : 'var(--med-color)'));
                        html += `
                            <li class="log-item" style="background-color: ${bgColor};">
                                <div class="log-info" onclick="if('${log.type}'.startsWith('吃奶')) { openMilkModal('${log.id}', '${log.type}'); }">
                                    <b>${log.type}</b>
                                    <span>${log.timeStr}</span>
                                </div>
                                <div class="log-actions" onclick="event.stopPropagation()">
                                    <div class="action-btn-wrap">
                                        <button class="action-btn" type="button">⏰</button>
                                        <input type="datetime-local" class="time-picker-overlay" value="${log.fullTime}" 
                                               onfocus="isEditingTime = true" 
                                               onchange="window.handleTimeUpdate('${log.id}', this.value)"
                                               onblur="setTimeout(() => { isEditingTime = false; }, 500)">
                                    </div>
                                    <button class="action-btn" type="button" style="color:#ff9999; cursor:pointer;" 
                                            onclick="window.deleteRecord('${log.id}')">🗑️</button>
                                </div>
                            </li>`;
                    });
                    listEl.innerHTML = html;
                });
            }
        };
        window.handleClearAll = () => window.clearAllRecords(familyId);
    </script>
</body>
</html>
